<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Our Hotel</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='hotel-luxury.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Luxury Hotel</span>
        <a href="/login" class="btn btn-warning">Admin Login</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Available Rooms</h2>

    <div class="row">
        {% for room in rooms %}
        <div class="col-md-4">
            <div class="card mb-4 shadow">
                <div class="card-body">
                    <h5>Room {{ room.room_number }}</h5>
                    <p>Type: {{ room.room_type }}</p>
                    <p>Price: ₹ {{ room.price }}</p>
                    <a href="/public-book/{{ room.room_id }}" class="btn btn-primary">
                        Book Now
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
