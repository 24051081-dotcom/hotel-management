<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Aakaya | Admin Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Luxury CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hotel-luxury.css') }}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Video Background */
        .video-container {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -2;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dark Overlay */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
        }

        /* Center Wrapper */
        .login-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Card */
        .login-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 50px 45px;
            width: 380px;
            border-radius: 12px;
            border: 1px solid rgba(201,168,76,0.4);
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .login-card span {
            color: #c9a84c;
            font-style: italic;
        }

        .login-card p {
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: rgba(255,255,255,0.6);
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .login-card input:focus {
            border-color: #c9a84c;
            box-shadow: 0 0 10px rgba(201,168,76,0.6);
        }

        .login-card button {
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background: #c9a84c;
            color: black;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-card button:hover {
            background: #e4c97e;
            box-shadow: 0 0 15px rgba(201,168,76,0.7);
        }

        /* Brand Title Top */
        .brand-title {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            color: white;
        }

        .brand-title h2 {
            font-size: 60px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        .brand-title span {
            color: #c9a84c;
        }
    </style>
</head>

<body>

    <!-- Video Background -->
    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="{{ url_for('static', filename='hotel.mp4') }}" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Brand Title -->
    <div class="brand-title">
        <h2>Hotel <span>Aakaya</span></h2>
    </div>

    <!-- Login Panel -->
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Welcome <span>Back</span></h1>
            <p>ADMIN PORTAL</p>

            <form method="POST" action="/login">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">LOGIN</button>
            </form>
        </div>
    </div>

</body>
</html>
